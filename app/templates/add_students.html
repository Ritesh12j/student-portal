<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Add Student</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f6f8ff;padding:30px}
    .card{max-width:600px;margin:40px auto;padding:24px;background:#fff;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.06)}
    label{display:block;margin:10px 0 6px}
    input,select{width:100%;padding:10px;border-radius:6px;border:1px solid #ddd}
    button{margin-top:16px;padding:10px 16px;background:#667eea;color:#fff;border-radius:6px;border:none}
  </style>
</head>
<body>
  <div class="card">
    <h2>Add Student</h2>
    <form method="post" action="/students/add">
      <label for="name">Name</label>
      <input id="name" name="name" required />
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required />
      <label for="course">Course</label>
      <input id="course" name="course" />
      <button type="submit">Add Student</button>
    </form>
  </div>
</body>
</html>
