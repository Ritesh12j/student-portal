<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>📋 Student Records</h1>
        <div class="table-container">
            {% if students %}
            <table>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                </tr>
                {% for student in students %}
                <tr>
                    <td>{{ student.id }}</td>
                    <td>{{ student.name }}</td>
                    <td>{{ student.email }}</td>
                </tr>
                {% endfor %}
            </table>
            {% else %}
            <p>No students found. Add one below!</p>
            {% endif %}
        </div>

        <div>
            <a href="{{ url_for('main.add_student') }}" class="button">➕ Add Student</a>
            <a href="{{ url_for('main.index') }}" class="button">🏠 Back to Home</a>
        </div>
    </div>
</body>
</html>
