<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Students List</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f6f8ff;padding:30px}
    table{width:90%;margin:0 auto;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden}
    th,td{padding:12px;text-align:left;border-bottom:1px solid #eee}
    th{background:#667eea;color:#fff}
    .actions{text-align:center}
    .top{width:90%;margin:0 auto 18px auto;display:flex;justify-content:space-between;align-items:center}
    a.btn{padding:8px 14px;background:#667eea;color:#fff;border-radius:6px;text-decoration:none}
  </style>
</head>
<body>
  <div class="top">
    <h2>Students</h2>
    <div>
      <a class="btn" href="/">Home</a>
      <a class="btn" href="/students/add">Add Student</a>
    </div>
  </div>

  <table>
    <thead>
      <tr><th>ID</th><th>Name</th><th>Email</th><th>Course</th><th>Created At</th></tr>
    </thead>
    <tbody>
      {% for s in students %}
      <tr>
        <td>{{ s.id }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.email }}</td>
        <td>{{ s.course or "-" }}</td>
        <td>{{ s.created_at.strftime("%Y-%m-%d %H:%M:%S") if s.created_at else "-" }}</td>
      </tr>
      {% else %}
      <tr><td colspan="5" style="text-align:center;padding:20px">No students yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
